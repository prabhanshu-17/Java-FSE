# Spring Boot Application Configuration
# This file contains all the configuration properties for the Spring Learn application

# =============================================
# SERVER CONFIGURATION
# =============================================
# Server port configuration
server.port=8080

# Server servlet context path
server.servlet.context-path=/

# =============================================
# APPLICATION CONFIGURATION
# =============================================
# Application name
spring.application.name=spring-learn

# =============================================
# LOGGING CONFIGURATION
# =============================================
# Root logging level (ALL, DEBUG, INFO, WARN, ERROR, OFF)
logging.level.root=INFO

# Application package logging level
logging.level.com.cognizant=DEBUG

# Spring Framework logging level
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO

# Hibernate logging (if database is used later)
logging.level.org.hibernate=WARN

# Tomcat logging
logging.level.org.apache.catalina=WARN

# Logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# SPRING BOOT DEVTOOLS CONFIGURATION
# =============================================
# Enable live reload
spring.devtools.livereload.enabled=true

# Enable automatic restart
spring.devtools.restart.enabled=true

# =============================================
# ADDITIONAL PROPERTIES
# =============================================
# Application description
app.description=Spring Boot Web Application for Learning
app.version=0.0.1-SNAPSHOT
